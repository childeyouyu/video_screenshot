<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频截图工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 12px;
            color: #666;
        }
        
        .feature-list {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .feature-item:last-child {
            border-bottom: none;
        }
        
        .feature-icon {
            width: 32px;
            height: 32px;
            background: #ff6600;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .feature-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        
        .feature-text h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 2px;
        }
        
        .feature-text p {
            font-size: 12px;
            color: #999;
        }
        
        .usage {
            background: white;
            border-radius: 8px;
            padding: 15px;
        }
        
        .usage h2 {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .usage ol {
            padding-left: 20px;
        }
        
        .usage li {
            font-size: 12px;
            color: #666;
            line-height: 1.8;
        }
        
        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 视频截图工具</h1>
        <p>快速捕获网页视频精彩画面</p>
    </div>
    
    <div class="feature-list">
        <div class="feature-item">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
            </div>
            <div class="feature-text">
                <h3>一键截图</h3>
                <p>点击按钮即可保存当前帧</p>
            </div>
        </div>
        
        <div class="feature-item">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
                </svg>
            </div>
            <div class="feature-text">
                <h3>高清画质</h3>
                <p>保存原始分辨率图片</p>
            </div>
        </div>
        
        <div class="feature-item">
            <div class="feature-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12z"/>
                </svg>
            </div>
            <div class="feature-text">
                <h3>智能识别</h3>
                <p>自动检测页面中的视频</p>
            </div>
        </div>
    </div>
    
    <div class="usage">
        <h2>使用方法</h2>
        <ol>
            <li>打开包含视频的网页：目前支持哔哩哔哩，YouTube，飞牛影视</li>
            <li>视频播放器右侧会显示"截图"按钮</li>
            <li>点击按钮即可保存当前画面到下载文件夹</li>
        </ol>
    </div>
    
    <div class="footer">
        版本 1.0 | 视频截图工具
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
