      <circle cx="100" cy="100" r="68" fill="white" />
      
      <g transform="translate(100, 100) rotate(30)">
        
        <polygon points="24,0 12,20.784 -12,20.784 -24,0 -12,-20.784 12,-20.784" fill="black" />
        
